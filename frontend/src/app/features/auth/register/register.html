<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-text">FeedLens</span>
      <p class="logo-tagline">Join and control your algorithm</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input
          type="text"
          [(ngModel)]="request.fullName"
          name="fullName"
          placeholder="Full name"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="email"
          [(ngModel)]="request.email"
          name="email"
          placeholder="Email"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          [(ngModel)]="request.password"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm password"
          required
        />
      </div>

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Sign up' }}
      </button>
    </form>

    <div class="auth-divider">
      <span>OR</span>
    </div>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/auth/login">Log in</a></p>
    </div>

  </div>
</div>
