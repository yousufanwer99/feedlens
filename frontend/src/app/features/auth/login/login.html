<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">
            <span class="logo-text">FeedLens</span>
            <p class="logo-tagline">You control your algorithm</p>
        </div>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <input type="email" [(ngModel)]="request.email" name="email" placeholder="Email" required
                    autocomplete="email" />
            </div>

            <div class="form-group">
                <input type="password" [(ngModel)]="request.password" name="password" placeholder="Password" required
                    autocomplete="current-password" />
            </div>

            @if (errorMessage) {
            <p class="error-message">{{ errorMessage }}</p>
            }

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                {{ isLoading ? 'Logging in...' : 'Log in' }}
            </button>
        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/auth/register">Sign up</a></p>
        </div>

    </div>
</div>
