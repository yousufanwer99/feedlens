<div class="upload-container">
  <div class="upload-card">

    <h2 class="page-title">Upload Video</h2>

    @if (!selectedFile) {
      <label class="drop-zone">
        <input type="file" accept="video/*" (change)="onFileSelected($event)" hidden>
        <div class="drop-content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          <p class="drop-title">Click to select video</p>
          <p class="drop-hint">MP4, MOV, AVI up to 500MB</p>
        </div>
      </label>
    } @else {
      <div class="preview-section">
        <video [src]="videoPreviewUrl!" controls class="video-preview"></video>
        <button class="change-btn" (click)="selectedFile = null; videoPreviewUrl = null">
          Change video
        </button>
      </div>
    }

    <div class="form-group">
      <label>Title *</label>
      <input type="text" [(ngModel)]="form.title" placeholder="Enter video title" maxlength="200"/>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="form.description" placeholder="What is this video about?"></textarea>
    </div>

    <div class="form-group">
      <label>Category *</label>
      <select [(ngModel)]="form.category">
        <option value="">Select category</option>
        @for (cat of categories; track cat) {
          <option [value]="cat">{{ cat }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Tags <span class="optional">(comma separated)</span></label>
      <input type="text" [(ngModel)]="form.tags" placeholder="e.g. dotnet, angular, webdev"/>
    </div>

    @if (isUploading) {
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="uploadProgress"></div>
        </div>
        <span class="progress-text">
          {{ uploadProgress < 100 ? 'Uploading ' + uploadProgress + '%...' : 'Saving...' }}
        </span>
      </div>
    }

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    @if (successMessage) {
      <p class="success-message">{{ successMessage }}</p>
    }

    <button class="btn-primary" (click)="onSubmit()" [disabled]="isUploading">
      {{ isUploading ? 'Uploading...' : 'Upload Video' }}
    </button>

  </div>
</div>
