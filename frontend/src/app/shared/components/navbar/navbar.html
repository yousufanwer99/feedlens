<nav class="navbar">
  <div class="nav-container">

    <a routerLink="/feed" class="nav-logo">
      <span class="logo-text">FeedLens</span>
    </a>
    <div class="nav-search">
      <input type="text" [(ngModel)]="searchQuery" placeholder="Search videos..." (keyup.enter)="onSearch($event)"
        class="search-input" />
    </div>
    <div class="nav-actions">
      @if (authService.isLoggedIn()) {
      <a routerLink="/upload" class="nav-icon-btn" title="Upload">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
      </a>
      <a routerLink="/profile" class="nav-icon-btn" title="Profile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
      <button class="nav-icon-btn" (click)="logout()" title="Logout">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
      } @else {
      <a routerLink="/auth/login" class="btn-login">Log in</a>
      <a routerLink="/auth/register" class="btn-register">Sign up</a>
      }
    </div>

  </div>
</nav>
